<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}智能考勤系统{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">📋 智能考勤人脸识别系统</div>
        <div class="nav-links">
            <a href="{{ url_for('index') }}" class="nav-link">签到</a>
            <a href="{{ url_for('register_page') }}" class="nav-link">人脸录入</a>
            <a href="{{ url_for('records_page') }}" class="nav-link">签到记录</a>
            <a href="{{ url_for('statistics_page') }}" class="nav-link">考勤统计</a>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
